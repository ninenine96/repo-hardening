name: Mark stale issues and PRs

on:
  schedule:
    - cron: "0 0 * * 1"  # every Monday

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: "status: stale"
          stale-pr-label: "status: stale"
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. If this is still relevant, please leave a comment.
          stale-pr-message: >
            This PR has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. Please rebase and update if you'd like to continue.
          close-issue-message: "Closing due to inactivity. Feel free to reopen if this is still relevant."
          close-pr-message: "Closing due to inactivity. Feel free to reopen if you'd like to continue."
          exempt-issue-labels: "status: in progress,status: blocked,priority: high"
          exempt-pr-labels: "status: in progress,status: blocked"
